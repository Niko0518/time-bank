plugins {
    alias(libs.plugins.android.application)
}

android {
    namespace 'com.jianglicheng.timebank'
    compileSdk {
        version = release(36)
    }

    defaultConfig {
        applicationId "com.jianglicheng.timebank"
        minSdk 24
        targetSdk 36
        versionCode 40  // [v9.0.10] 完善：Watch 主动心跳保活（根因修复） + 8次失败上限 + 自愈探针（不等用户操作） + 顶部固定 4 状态指示器 + 诊断面板 + 用户感知重置入口 + 设置页自愈倒计时；同步修 Bug ①（__normalizeDate）+ Bug ②（__safeBind）+ 启动隔离（__safeSetup）
        /* AI WARNING: DO NOT UPDATE VERSION.
           Versioin numbering is managed MANUALLY by the user at the START of an update cycle.
           Do not increment this automatically. */
        versionName "9.0.10"//v9.0.10

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    // [v8.0.0] 消除 deprecation 警告
    tasks.withType(JavaCompile) {
        options.compilerArgs += ['-Xlint:deprecation']
    }
}

dependencies {
    implementation libs.appcompat
    implementation libs.material
    implementation libs.activity
    implementation libs.constraintlayout
    implementation libs.webkit

    // [v8.0.0-cloud] AI 洞察报告：已改为云端方案
    // 通过 CloudBase 云函数调用 Gemini/混元/OpenAI
    // 移除了 MediaPipe 本地模型依赖

    testImplementation libs.junit
    androidTestImplementation libs.ext.junit
    androidTestImplementation libs.espresso.core
}