plugins {
    alias(libs.plugins.android.application)
}

android {
    namespace 'com.jianglicheng.timebank'
    compileSdk {
        version = release(36)
    }

    defaultConfig {
        applicationId "com.jianglicheng.timebank"
        minSdk 24
        targetSdk 36
        versionCode 37  // [v9.0.6] P0 修复"任务复活"：DAL.stopTask 改 await 等待云端确认 + 业务层先云端后本地 + 修 loadAll 跨设备合并逻辑
        versionName "9.0.6" /* [v9.0.6] AI WARNING: DO NOT UPDATE VERSION.
           Version numbering is managed MANUALLY by the user at the START of an update cycle.
           Do not increment this automatically. */

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    // [v8.0.0] 消除 deprecation 警告
    tasks.withType(JavaCompile) {
        options.compilerArgs += ['-Xlint:deprecation']
    }
}

dependencies {
    implementation libs.appcompat
    implementation libs.material
    implementation libs.activity
    implementation libs.constraintlayout
    implementation libs.webkit

    // [v8.0.0-cloud] AI 洞察报告：已改为云端方案
    // 通过 CloudBase 云函数调用 Gemini/混元/OpenAI
    // 移除了 MediaPipe 本地模型依赖

    testImplementation libs.junit
    androidTestImplementation libs.ext.junit
    androidTestImplementation libs.espresso.core
}