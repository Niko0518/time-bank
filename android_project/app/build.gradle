plugins {
    alias(libs.plugins.android.application)
}

android {
    namespace 'com.jianglicheng.timebank'
    compileSdk {
        version = release(36)
    }

    defaultConfig {
        applicationId "com.jianglicheng.timebank"
        minSdk 24
        targetSdk 36
        versionCode 37  // [v9.0.7] 习惯系统重构: applyDataState 末尾 buildTransactionIndex + DAL mutation onRollback 加索引清理 + rebuildHabitStreak 单一数据源 + processHabitCompletion 一次原子调用 + 设置页加"修复 habit streak"按钮
        /* AI WARNING: DO NOT UPDATE VERSION.
           Versioin numbering is managed MANUALLY by the user at the START of an update cycle.
           Do not increment this automatically. */
        versionName "9.0.7"//v9.0.7

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    // [v8.0.0] 消除 deprecation 警告
    tasks.withType(JavaCompile) {
        options.compilerArgs += ['-Xlint:deprecation']
    }
}

dependencies {
    implementation libs.appcompat
    implementation libs.material
    implementation libs.activity
    implementation libs.constraintlayout
    implementation libs.webkit

    // [v8.0.0-cloud] AI 洞察报告：已改为云端方案
    // 通过 CloudBase 云函数调用 Gemini/混元/OpenAI
    // 移除了 MediaPipe 本地模型依赖

    testImplementation libs.junit
    androidTestImplementation libs.ext.junit
    androidTestImplementation libs.espresso.core
}