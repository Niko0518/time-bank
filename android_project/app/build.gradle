plugins {
    alias(libs.plugins.android.application)
}

android {
    namespace 'com.jianglicheng.timebank'
    compileSdk {
        version = release(36)
    }

    defaultConfig {
        applicationId "com.jianglicheng.timebank"
        minSdk 24
        targetSdk 36
        versionCode 86  // [v9.17.7] 新设备登录睡眠参数继承云端：initSleepSettings 全新安装 + per-device 格式采用云端值并触发 shared 迁移；watch 回退路径 force=true；saveSleepSettings 补 napMinDurationMinutes
        versionName "9.17.7"//v9.17.7

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    // [v8.0.0] 消除 deprecation 警告
    tasks.withType(JavaCompile) {
        options.compilerArgs += ['-Xlint:deprecation']
    }
}

dependencies {
    implementation libs.appcompat
    implementation libs.material
    implementation libs.activity
    implementation libs.constraintlayout
    implementation libs.webkit
    // [v9.3.3] WorkManager 周期任务：云端同步调度器
    implementation libs.work.runtime
    // [v9.3.3] Gson：Worker 内部 JSON 序列化
    implementation libs.gson

    // [v8.0.0-cloud] AI 洞察报告：已改为云端方案
    // 通过 CloudBase 云函数调用 Gemini/混元/OpenAI
    // 移除了 MediaPipe 本地模型依赖

    testImplementation libs.junit
    androidTestImplementation libs.ext.junit
    androidTestImplementation libs.espresso.core
}