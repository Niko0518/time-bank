plugins {
    alias(libs.plugins.android.application)
}

android {
    namespace 'com.jianglicheng.timebank'
    compileSdk {
        version = release(36)
    }

    defaultConfig {
        applicationId "com.jianglicheng.timebank"
        minSdk 24
        targetSdk 36
        versionCode 55  // [v9.5.1] 跨设备补录守卫：自动检测多设备场景误退款修复
        versionName "9.5.1"//v9.5.1

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // [v9.4.0] 个推 PUSH 元数据（从 https://dev.getui.com/ 应用管理获取）
        manifestPlaceholders = [
            GETUI_APPID     : "dLJuJ6X73159xU5mq9CoZs",
            GETUI_APPKEY    : "NCojctPSbk6HUpPCliQaz",
            GETUI_APPSECRET : "Gdzek6LuLb88g8iDnE9hS4"
        ]
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    // [v8.0.0] 消除 deprecation 警告
    tasks.withType(JavaCompile) {
        options.compilerArgs += ['-Xlint:deprecation']
    }
}

dependencies {
    implementation libs.appcompat
    implementation libs.material
    implementation libs.activity
    implementation libs.constraintlayout
    implementation libs.webkit
    // [v9.3.3] WorkManager 周期任务：云端同步调度器
    implementation libs.work.runtime
    // [v9.3.3] Gson：Worker 内部 JSON 序列化
    implementation libs.gson
    // [v9.4.0] MQTT 客户端：独立进程长连接
    implementation libs.paho.mqtt
    // [v9.4.0] 个推 PUSH SDK：深 Doze 唤起
    implementation libs.getui.gtsdk
    // [v9.4.0] 个推核心组件（gtsdk 依赖 gtc）
    implementation libs.getui.gtc

    // [v8.0.0-cloud] AI 洞察报告：已改为云端方案
    // 通过 CloudBase 云函数调用 Gemini/混元/OpenAI
    // 移除了 MediaPipe 本地模型依赖

    testImplementation libs.junit
    androidTestImplementation libs.ext.junit
    androidTestImplementation libs.espresso.core
}